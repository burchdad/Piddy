<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piddy - Loading</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            color: #fff;
            overflow: hidden;
        }

        .splash-container {
            text-align: center;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo-section {
            animation: fadeIn 0.6s ease-in;
        }

        .logo {
            font-size: 80px;
            margin-bottom: 15px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        .app-title {
            font-size: 36px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 10px;
            animation: slideDown 0.8s ease-out;
        }

        .app-subtitle {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 1px;
            animation: slideDown 1s ease-out;
        }

        .loading-section {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            animation: fadeIn 1.2s ease-in;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 2px;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        .status-text {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
            height: 20px;
            font-weight: 500;
            letter-spacing: 0.5px;
            min-height: 20px;
            animation: fadeIn 0.6s ease-in;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }

        /* Animations */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 0.6;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.2);
            }
        }

        .bottom-text {
            position: absolute;
            bottom: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }

        .version {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-section">
            <div class="logo">🤖</div>
            <h1 class="app-title">PIDDY</h1>
            <p class="app-subtitle">AI BACKEND DEVELOPER</p>
        </div>

        <div class="loading-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="status-text">
                <span class="status-dot"></span>
                <span id="statusText">Initializing...</span>
            </div>
        </div>
    </div>

    <div class="bottom-text">
        Starting backend and frontend services...
    </div>

    <div class="version">v1.0.0</div>

    <script>
        const { ipcRenderer } = require('electron');

        const statusText = document.getElementById('statusText');
        const progressFill = document.getElementById('progressFill');

        let currentProgress = 0;

        // Receive updates from main process
        ipcRenderer.on('splash-status', (event, data) => {
            statusText.textContent = data.message;
            currentProgress = Math.min(currentProgress + data.progress || 10, 95);
            progressFill.style.width = currentProgress + '%';
        });

        // Simulate progress while waiting
        const progressInterval = setInterval(() => {
            if (currentProgress < 90) {
                currentProgress += Math.random() * 5;
                progressFill.style.width = Math.min(currentProgress, 90) + '%';
            }
        }, 300);

        // Close window when ready
        ipcRenderer.on('splash-complete', () => {
            clearInterval(progressInterval);
            progressFill.style.width = '100%';
            setTimeout(() => {
                window.close();
            }, 300);
        });
    </script>
</body>
</html>
