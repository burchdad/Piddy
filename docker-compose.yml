version: '3.8'

services:
  piddy:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_SIGNING_SECRET=${SLACK_SIGNING_SECRET}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=sqlite:///./piddy.db
      - DEBUG=True
    volumes:
      - ./src:/app/src
      - ./config:/app/config
      - piddy_data:/app
    restart: unless-stopped

volumes:
  piddy_data:
